<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo verde lleno al borde (maskable: sin bordes redondeados) -->
  <rect width="512" height="512" fill="#16a34a" shape-rendering="crispEdges"/>
  <rect width="512" height="512" fill="url(#grad)" opacity="0.2" shape-rendering="crispEdges"/>
  <!-- Contenido dentro del safe zone (80% = ~410px, margen ~51px) -->
  <text
    x="264"
    y="330"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-weight="800"
    font-size="250"
    text-anchor="middle"
    fill="white"
    letter-spacing="-6"
  >C</text>
  <circle cx="348" cy="164" r="30" fill="white" opacity="0.2"/>
  <circle cx="348" cy="164" r="17" fill="white" opacity="0.9"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="black"/>
    </linearGradient>
  </defs>
</svg>
