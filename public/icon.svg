<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo verde redondeado -->
  <rect width="512" height="512" rx="115" fill="#16a34a"/>
  <!-- Sombra interior sutil -->
  <rect width="512" height="512" rx="115" fill="url(#grad)" opacity="0.25"/>
  <!-- Letra C -->
  <text
    x="264"
    y="348"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-weight="800"
    font-size="300"
    text-anchor="middle"
    fill="white"
    letter-spacing="-8"
  >C</text>
  <!-- Pelota pequeña decorativa -->
  <circle cx="358" cy="154" r="36" fill="white" opacity="0.2"/>
  <circle cx="358" cy="154" r="20" fill="white" opacity="0.9"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="black"/>
    </linearGradient>
  </defs>
</svg>
